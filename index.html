<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="home-screen">
        <div class="top-bar">
            <h1>ziply puzzel</h1>
            <div class="coin-display">⭐ <span id="coin-count">0</span></div>
            <button id="setting-button">⚙️</button>
        </div>
        <div class="centre-content">
            
            <div class="slider-container">
                <button class="slider-btn" id="prev-btn" onclick="slideTheme(-1)"> '<' </button>
                <div class="theme-slider" id="theme-slider">
                    <div class="theme-card" id="theme-clasic">  clasic
                        <button class="theme-btn" onclick="handleTheme('clasic')">selected</button>
                    </div>
                    <div class="theme-card" id="theme-wood"> wood
                        <button class="theme-btn" onclick="handleTheme('wood')">Unlock 5 ⭐</button>
                    </div>
                    <div class="theme-card" id="theme-ice"> ice 
                        <button class="theme-btn" onclick="handleTheme('ice')">Lvl 3 Req</button> 

                    </div>
                    <div class="theme-card" id="theme-glass"> glass
                        <button class="theme-btn" onclick="handleTheme('glass')">Unlock 15 ⭐</button>  

                    </div>
                    <div class="theme-card" id="theme-paper"> papre
                        <button class="theme-btn" onclick="handleTheme('papre')">login for 7 days</button>  

                    </div>
                </div>
                <button class="slider-btn" id="next-btn" onclick="slideTheme(1)"> '>' </button>
                
            </div>
            <p class="swip-text">swip to change theme</p>
        </div>
        <div class="bottom-bar">
            <button class="primery-button" onclick="OpenLevelPage()">play</button>

        </div>
        
    </div>

    <div id='level-screen' >
        <div id="level-disply">


        </div>
        <div class="button-container">
            <button class="primery-button" onclick="start()" >continue </button>
            <button class="primery-button" onclick="backhome()">backhome</button>

        </div>

    </div>
    <div id="game-screen">
        <div id="grid">

        </div>
        <button class="primery-button" onclick="start()">reset</button>
        <button class="primery-button" onclick="backhome()">go home</button>
        <button class="primery-button" onclick="OpenLevelPage()">back</button>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
